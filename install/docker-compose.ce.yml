name: flyto2-warroom-ce

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-flyto}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-local-only}" # placeholder
      POSTGRES_DB: "${POSTGRES_DB:-flyto}"
    ports:
      - "127.0.0.1:${FLYTO_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-flyto}"]
      interval: 1s
      timeout: 2s
      retries: 30

  engine:
    image: "${FLYTO_WARROOM_ENGINE_IMAGE:-docker.io/flyto2/warroom}:${FLYTO_WARROOM_ENGINE_TAG:-engine-ce}"
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FLYTO_ENGINE_PORT:-8080}:8080"
    environment:
      FLYTO_EDITION: "community"
      FLYTO_CE_ADDR: ":8080"
      FLYTO_AUTH_MODE: "local_jwt"
      FLYTO_LOCAL_AUTH_ALLOW_BOOTSTRAP: "1"
      FLYTO_LOCAL_AUTH_JWT_SECRET: "${FLYTO_LOCAL_AUTH_JWT_SECRET:?set FLYTO_LOCAL_AUTH_JWT_SECRET in install/.env}" # placeholder
      FLYTO_LOCAL_AUTH_PASSWORD_SHA256: "" # legacy key remains deliberately empty
      FLYTO_PG_URL: "postgres://${POSTGRES_USER:-flyto}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-flyto}?sslmode=disable" # placeholder
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: "${FLYTO_WARROOM_WORKER_IMAGE:-docker.io/flyto2/warroom}:${FLYTO_WARROOM_WORKER_TAG:-worker-ce}"
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FLYTO_WORKER_PORT:-8081}:8081"
    environment:
      FLYTO_EDITION: "community"
      FLYTO_CE_WORKER_ADDR: ":8081"
      FLYTO_PG_URL: "postgres://${POSTGRES_USER:-flyto}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-flyto}?sslmode=disable" # placeholder
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: "${FLYTO_WARROOM_FRONTEND_IMAGE:-docker.io/flyto2/warroom}:${FLYTO_WARROOM_FRONTEND_TAG:-code-ce}"
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FLYTO_CODE_PORT:-8088}:8080"
    depends_on:
      engine:
        condition: service_healthy

volumes:
  pgdata:
