name: flyto2-warroom-ce-source

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-flyto}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-local-only}"
      POSTGRES_DB: "${POSTGRES_DB:-flyto}"
    volumes:
      - source-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-flyto}"]
      interval: 1s
      timeout: 2s
      retries: 30

  engine:
    build:
      context: ../services/flyto-engine-ce
      dockerfile: Dockerfile
      target: engine
    image: flyto2/warroom-engine-ce-source:local
    restart: unless-stopped
    environment:
      FLYTO_EDITION: community
      FLYTO_CE_ADDR: :8080
      FLYTO_PG_URL: "postgres://${POSTGRES_USER:-flyto}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-flyto}?sslmode=disable"
      FLYTO_LOCAL_AUTH_JWT_SECRET: "${FLYTO_LOCAL_AUTH_JWT_SECRET:?run make setup-ce first}" # placeholder
      FLYTO_LOCAL_AUTH_ALLOW_BOOTSTRAP: "1"
    ports:
      - "127.0.0.1:${FLYTO_SOURCE_ENGINE_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ../services/flyto-engine-ce
      dockerfile: Dockerfile
      target: worker
    image: flyto2/warroom-worker-ce-source:local
    restart: unless-stopped
    environment:
      FLYTO_EDITION: community
      FLYTO_CE_WORKER_ADDR: :8081
      FLYTO_PG_URL: "postgres://${POSTGRES_USER:-flyto}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-flyto}?sslmode=disable"
    ports:
      - "127.0.0.1:${FLYTO_SOURCE_WORKER_PORT:-18081}:8081"
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: ../services/flyto-engine-ce
      dockerfile: Dockerfile
      target: scheduler
    image: flyto2/warroom-scheduler-ce-source:local
    restart: unless-stopped
    environment:
      FLYTO_EDITION: community
      FLYTO_CE_SCHEDULER_ADDR: :8082
      FLYTO_CE_SCAN_INTERVAL: "${FLYTO_CE_SCAN_INTERVAL:-24h}"
      FLYTO_PG_URL: "postgres://${POSTGRES_USER:-flyto}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-flyto}?sslmode=disable"
    ports:
      - "127.0.0.1:${FLYTO_SOURCE_SCHEDULER_PORT:-18082}:8082"
    depends_on:
      postgres:
        condition: service_healthy

  analysis:
    build:
      context: ../services/flyto-engine-ce
      dockerfile: Dockerfile
      target: analysis
    image: flyto2/warroom-analysis-ce-source:local
    restart: unless-stopped
    environment:
      FLYTO_EDITION: community
      FLYTO_CE_ANALYSIS_ADDR: :8083
      FLYTO_PG_URL: "postgres://${POSTGRES_USER:-flyto}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-flyto}?sslmode=disable"
    ports:
      - "127.0.0.1:${FLYTO_SOURCE_ANALYSIS_PORT:-18083}:8083"
    depends_on:
      postgres:
        condition: service_healthy

  report:
    build:
      context: ../services/flyto-engine-ce
      dockerfile: Dockerfile
      target: report
    image: flyto2/warroom-report-ce-source:local
    restart: unless-stopped
    environment:
      FLYTO_EDITION: community
      FLYTO_CE_REPORT_ADDR: :8084
      FLYTO_PG_URL: "postgres://${POSTGRES_USER:-flyto}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-flyto}?sslmode=disable"
    ports:
      - "127.0.0.1:${FLYTO_SOURCE_REPORT_PORT:-18084}:8084"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../packages/flyto-code
      dockerfile: Dockerfile
    image: flyto2/warroom-code-ce-source:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FLYTO_SOURCE_CODE_PORT:-18088}:8080"
    depends_on:
      engine:
        condition: service_healthy

volumes:
  source-pgdata:
