services:
  engine:
    environment:
      FLYTO_EDITION: "community"
      FLYTO_AUTH_MODE: "local_jwt"
      FLYTO_DEV_AUTH: "0"
      FLYTO_DEPLOYMENT_ID: "${FLYTO_DEPLOYMENT_ID:-local-ee-sim}"
      FLYTO_ENTERPRISE_JWT_SECRET_KEY: "${FLYTO_ENTERPRISE_JWT_SECRET_KEY:?set FLYTO_ENTERPRISE_JWT_SECRET_KEY in install/.env.ee-sim}" # placeholder
      FLYTO_ENTERPRISE_JWT_PREVIOUS_SECRET_KEYS: "${FLYTO_ENTERPRISE_JWT_PREVIOUS_SECRET_KEYS:-}"

# This file is a fail-closed boundary test only. CE images remain CE and do not
# contain Enterprise implementation, managed providers, or live remediation.
