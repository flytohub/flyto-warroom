modules:
  - key: core
    display_name: Core Evidence Platform
    title_key: projects.feature.core
    description: Always-on workspace shell, dashboard, audit, scoring, settings, and shared administration.
    description_key: projects.feature.coreDesc
    category: core
    risk_level: low
    status: live
    landing_path: dashboard
    source_selectable: false
    flyto_native: true
    default_enabled: true
    billing: ce_included
    ce_value: Local workspace shell, dashboard, audit timeline, scoring primitives, settings, and role administration.
    enterprise_value: Enterprise identity, offline licensing, legal hold, support SLA, and controlled deployment boundaries.
    upgrade_trigger: Teams need SSO, legal hold, offline license, audit export guarantees, or regulated deployment support.
    cross_cutting: true
    aliases: [workspace_core]
    features: []
    gating_features: []
    permissions: [asset:read, org:settings, org:delete, member:invite, member:remove, member:role_change, score:configure, system:rbac:read, system:rbac:write]
    commercial_actions: []
    pages: [dashboard, verdict, pulse, footprint, operations, audit_timeline, timeline, scoring, score_trends, settings, org, repo_detail, exec]
    navigation: [overview, assets, evidence, workflows]
    providers: []

  - key: code
    display_name: Code Security
    title_key: projects.feature.codeAudit
    description: Scan source code for vulnerabilities, secrets, dependency risk, and IaC issues.
    description_key: projects.feature.codeAuditDesc
    category: surface
    risk_level: medium
    status: live
    landing_path: issues
    source_selectable: true
    flyto_native: true
    default_enabled: true
    billing: ce_included
    ce_value: Local SAST, SCA, secrets, IaC, reachability, code score, scan lifecycle, and finding evidence.
    enterprise_value: AI-assisted proposals, promotion approval, rollback evidence, private runners, and managed code remediation workflows.
    upgrade_trigger: Engineering teams need approval-backed remediation, PR promotion controls, private runner scale, or commercial AI proposals.
    aliases: [code_audit, sast]
    features: [surface_code, scoring_unified, asset_map, code_audit, sast, sca, secrets, iac, reachability, ai_fix_plan]
    gating_features: [surface_code, code_audit]
    permissions: [asset:read, surface:read_code, scan:trigger_code, scan:trigger, scan:cancel, repo:connect, finding:verify]
    commercial_actions: [scan.code.run]
    pages: [repos, issues, pentest, warroom_architecture, warroom_security, containers, repo_detail]
    navigation: [overview, assets, findings, evidence, workflows, reports]
    providers: []

