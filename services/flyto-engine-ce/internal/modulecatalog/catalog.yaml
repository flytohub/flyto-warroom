# Templates (preset bundles) were removed — the create-project wizard is
# module-driven now (one clear list, no English/Chinese mixed second list).
#
# Billing is module-level: see `billing:` on each module above. Values are:
# `ce_included`, `enterprise_addon`, or `enterprise_only`. The frontend price
# badge and backend tests read this registry instead of hardcoding "free".
