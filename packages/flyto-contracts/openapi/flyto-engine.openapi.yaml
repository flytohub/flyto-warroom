        QueuedJobs: { type: array, items: { type: string } }
        Categorized:
          type: object
          properties:
            Category: { type: string }
            Subcategory: { type: string }
            Confidence: { type: number }
            RuleName: { type: string }

    PermissionCheckRequest:
      type: object
      properties:
        userRole: { type: string, enum: [owner, admin, member, guest] }
        isProjectMember: { type: boolean }
        isOwner: { type: boolean }
        visibility: { type: string }
        sensitivity: { type: string }
        workspace: { $ref: "#/components/schemas/PermissionLayer" }
        project: { $ref: "#/components/schemas/PermissionLayer" }
        folder: { $ref: "#/components/schemas/PermissionLayer" }
        resource: { $ref: "#/components/schemas/PermissionLayer" }

    PermissionLayer:
      type: object
      properties:
        visibility: { type: string }
        sensitivity: { type: string }

    AccessResult:
      type: object
      properties:
        CanAccess: { type: boolean }
        AuditRequired: { type: boolean }
        Reason: { type: string }

    AutofixPatchStatus:
      type: string
      enum: [no_preview, preview, outdated, pr_opened, permanently_no_preview]

    AutofixPatchStatusReason:
      type: string
      enum:
        - not_generated
        - patch_ready
        - pr_opened
        - cached_no_change
        - finding_resolved
        - clone_failed
        - detect_failed
        - transform_failed
        - rule_unavailable
        - ambiguous_match
        - retry_cap
        - empty_patch

    AutofixConfidence:
      type: object
      properties:
        level: { type: string, enum: [high, medium, low] }
        tier: { type: integer, enum: [1, 2] }
        reason_key: { type: string }
        reason_gates:
          type: array
          items: { type: string }

    AutofixFileChange:
      type: object
      properties:
        path: { type: string }
        status: { type: string, enum: [added, modified, removed] }
        before: { type: string }
        after: { type: string }

    AutofixGate:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [pass, fail, skipped, error] }
        message: { type: string }
        took_ms: { type: integer }

    AutofixFinding:
      type: object
      properties:
        id: { type: string }
        repo_id: { type: string }
        repo_name: { type: string }
        rule_id: { type: string }
        rule_title: { type: string }
        rule_category: { type: string }
        file_path: { type: string }
        line_number: { type: integer }
        severity: { type: string }
        title: { type: string }
        description: { type: string }
        patch_status: { $ref: "#/components/schemas/AutofixPatchStatus" }
        patch_status_reason: { $ref: "#/components/schemas/AutofixPatchStatusReason" }
        patch_status_message: { type: string }
        patch_title: { type: string }
        verify_passed: { type: boolean }
        pr_url: { type: string }
        pr_number: { type: integer }
        fingerprint: { type: string }
        detected_at: { type: string, format: date-time }
        patched_at: { type: string, format: date-time }
        confidence: { $ref: "#/components/schemas/AutofixConfidence" }

    AutofixFindingDetail:
      allOf:
        - $ref: "#/components/schemas/AutofixFinding"
        - type: object
          properties:
            patch_changes:
              type: array
              items: { $ref: "#/components/schemas/AutofixFileChange" }
            verify_gates:
              type: array
              items: { $ref: "#/components/schemas/AutofixGate" }
            patch_description: { type: string }
            retry_count: { type: integer }
            last_retry: { type: string, format: date-time }
            cached: { type: boolean }

    AutofixPreviewResponse:
      type: object
      properties:
        status: { $ref: "#/components/schemas/AutofixPatchStatus" }
        patch_status_reason: { $ref: "#/components/schemas/AutofixPatchStatusReason" }
        patch_status_message: { type: string }
        message: { type: string }
        verify_passed: { type: boolean }
        changes:
          type: array
          items: { $ref: "#/components/schemas/AutofixFileChange" }
        gates:
          type: array
          items: { $ref: "#/components/schemas/AutofixGate" }
        title: { type: string }
        description: { type: string }
        cached: { type: boolean }
        retry_count: { type: integer }
        last_retry: { type: string, format: date-time }
        file_sha: { type: string }

    AutofixOpenPRResponse:
      type: object
      properties:
        status: { type: string, enum: [pr_opened] }
        pr_url: { type: string }
        pr_number: { type: integer }
        warning: { type: string }

    ThreatSensorObservation:
      type: object
