        threat_category: { type: string }
        country_code: { type: string }
        asn: { type: integer }
        as_name: { type: string }
        protocol: { type: string }
        port: { type: integer }
        observed_count: { type: integer }
        confidence: { type: number }
        first_seen_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        raw_payload: { type: string }

    ThreatSensorStats:
      type: object
      properties:
        total: { type: integer }
        by_country:
          type: object
          additionalProperties: { type: integer }
        by_category:
          type: object
          additionalProperties: { type: integer }
        by_kind:
          type: object
          additionalProperties: { type: integer }
        by_source:
          type: object
          additionalProperties: { type: integer }

