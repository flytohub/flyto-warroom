name: Scrape Links
description: Extract all links from a webpage

args:
  url:
    type: string
    required: true
    description: URL to scrape links from
  output:
    type: string
    default: links.json
    description: Output file path

steps:
  - id: launch
    module: browser.launch
    params:
      headless: true

  - id: navigate
    module: browser.goto
    params:
      url: "{{url}}"

  - id: extract
    module: browser.evaluate
    params:
      script: |
        (() => {
          const links = document.querySelectorAll('a[href]');
          return JSON.stringify(Array.from(links).map(a => ({
            text: a.textContent.trim(),
            href: a.href
          })), null, 2);
        })()

  - id: save
    module: file.write
    params:
      path: "{{output}}"
      content: "${extract.result}"

  - id: close
    module: browser.close
