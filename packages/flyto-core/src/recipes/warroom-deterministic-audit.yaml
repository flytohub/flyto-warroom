name: Deterministic Verification Replay
description: Build deterministic site, intent, state, API and replay evidence without relying on LLM analysis.

args:
  target:
    type: string
    default: http://localhost:5173
    description: Target URL. Credentials and browser sessions must be supplied at runtime only.
  output:
    type: string
    default: warroom-evidence.json
    description: JSON evidence pack output path.
  markdown_output:
    type: string
    default: warroom-evidence.md
    description: Markdown evidence summary output path.
  output_prefix:
    type: string
    default: warroom-evidence
    description: Prefix for replay screenshot artifacts.
  network_url_pattern:
    type: string
    default: ".*"
    description: Regex for captured network requests.
  network_timeout_ms:
    type: integer
    default: 1500
    description: How long to monitor network requests after initial render.

steps:
  - id: launch
    module: browser.launch
    params:
      headless: true
      width: 1440
      height: 900

  - id: goto
    module: browser.goto
    params:
      url: "{{target}}"
      wait_until: domcontentloaded
      timeout_ms: 30000

  - id: settle
    module: browser.wait
    params:
      duration_ms: 1500

  - id: network_log
    module: browser.network
    params:
      action: monitor
      url_pattern: "{{network_url_pattern}}"
      timeout: "{{network_timeout_ms}}"
      include_headers: false
      strip_query: true

  - id: dom_snapshot
    module: browser.snapshot
    params:
      format: html

  - id: desktop_screenshot
    module: browser.screenshot
    params:
      path: "{{output_prefix}}-desktop.png"
      full_page: true

  - id: discover
    module: verification.discover
    params:
      target: "{{target}}"
      use_browser: true

  - id: generate
    module: verification.generate_scenarios
    params:
      site_graph: ${discover.site_graph}
      name: Deterministic verification replay

  - id: replay
    module: verification.run
    params:
      scenarios: ${generate.scenarios}
      stop_on_failure: true
      timeout_per_step: 30000

  - id: report_json
    module: verification.report
    params:
      site_graph: ${discover.site_graph}
      scenarios: ${generate.scenarios}
      run_result: ${replay}
      artifacts:
        target_url: "{{target}}"
        graph_contract: warroom.product_verification.v1
        verification_contract: flyto.core.deterministic_verification.v1
        screenshot: ${desktop_screenshot}
        dom_snapshot: ${dom_snapshot}
        network_log: ${network_log}
        llm_policy:
          required: false
          role: optional_evidence_reviewer
          can_gate: false
      format: json
      output_path: "{{output}}"

  - id: report_markdown
    module: verification.report
    params:
      site_graph: ${discover.site_graph}
      scenarios: ${generate.scenarios}
      run_result: ${replay}
      artifacts:
        target_url: "{{target}}"
        graph_contract: warroom.product_verification.v1
        verification_contract: flyto.core.deterministic_verification.v1
        screenshot: ${desktop_screenshot}
        dom_snapshot: ${dom_snapshot}
        network_log: ${network_log}
        llm_policy:
          required: false
          role: optional_evidence_reviewer
          can_gate: false
      format: markdown
      output_path: "{{markdown_output}}"

  - id: close
    module: browser.close
