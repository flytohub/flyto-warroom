name: JSON to CSV
description: Convert a JSON array file to CSV format

args:
  input:
    type: string
    required: true
    description: Path to input JSON file (must contain a JSON array)
  output:
    type: string
    default: output.csv
    description: Path to output CSV file

steps:
  - id: convert
    module: data.json_to_csv
    params:
      input_data: "{{input}}"
      output_path: "{{output}}"
