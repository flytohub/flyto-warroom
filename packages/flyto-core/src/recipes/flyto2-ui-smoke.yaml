name: Flyto2 UI Smoke
description: Reusable Flyto2 UI smoke for authenticated local/dev pages. Captures DOM integrity, console errors, desktop/mobile screenshots, and overflow signals.

args:
  base_url:
    type: string
    default: http://localhost:5173
    description: Flyto2 frontend origin. Use an already-authenticated/dev-auth session.
  path:
    type: string
    default: /footprint
    description: Page path to smoke, such as /footprint or /pentest.
  output:
    type: string
    default: flyto2-ui-smoke.json
    description: JSON audit output path.
  output_prefix:
    type: string
    default: flyto2-ui-smoke
    description: Prefix for screenshot artifacts.
  required_text:
    type: string
    default: "[]"
    description: JSON array of visible text labels that must appear on the page.
  api_url_pattern:
    type: string
    default: /api/
    description: Regex pattern for safe network status sampling.
  network_timeout_ms:
    type: number
    default: 1500
    description: How long to sample late XHR/fetch/API network activity.

steps:
  - id: launch
    module: browser.launch
    params:
      headless: true
      browser_type: chromium
      width: 1440
      height: 900

  - id: navigate
    module: browser.goto
    params:
      url: "{{base_url}}{{path}}"
      wait_until: domcontentloaded
      timeout_ms: 30000

  - id: settle
    module: browser.wait
    params:
      duration_ms: 2500

  - id: audit
    module: browser.evaluate
    params:
      script: |
        (requiredTextJson) => {
          const text = document.body?.innerText || '';
          const root = document.documentElement;
          const parseRequiredText = (value) => {
            if (Array.isArray(value)) return value.filter((label) => typeof label === 'string');
            if (typeof value !== 'string') return [];
            try {
              const parsed = JSON.parse(value || '[]');
              return Array.isArray(parsed) ? parsed.filter((label) => typeof label === 'string') : [];
            } catch {
              const label = value.trim();
              return label ? [label] : [];
            }
          };
          const requiredText = parseRequiredText(requiredTextJson);
          const controls = Array.from(document.querySelectorAll('button, a, [role="button"], [role="tab"], [aria-haspopup="menu"]'))
            .map((el) => ({
              tag: el.tagName.toLowerCase(),
              text: (el.textContent || el.getAttribute('aria-label') || '').trim().slice(0, 80),
              disabled: Boolean(el.disabled || el.getAttribute('aria-disabled') === 'true'),
              href: el.getAttribute('href') || null,
            }))
            .filter((item) => item.text || item.href)
            .slice(0, 120);
          const researchLabels = [
            'Research Summary',
            'Source Ledger',
            'Evidence Timeline',
            'Relations',
            'Missing Evidence',
            'Validation Tasks',
            'Decision Log',
            'Citation',
            'Export Evidence Bundle',
          ];
          const badTokenPatterns = [
            ['undefined', /\bundefined\b/i],
            ['NaN', /\bNaN\b/],
            ['null', /(^|\s)null(\s|$)/i],
          ];
          const badTokens = badTokenPatterns.filter(([, re]) => re.test(text)).map(([name]) => name);
          const missingRequiredText = requiredText.filter((label) => !text.includes(label));
          return {
            url: location.href,
            title: document.title,
            timestamp: new Date().toISOString(),
            viewport: { width: innerWidth, height: innerHeight },
            body_chars: text.length,
            horizontal_overflow: root.scrollWidth > innerWidth + 2,
            document_width: root.scrollWidth,
            viewport_width: innerWidth,
            bad_tokens: badTokens,
            required_text: requiredText,
            missing_required_text: missingRequiredText,
            pass_dom_integrity: badTokens.length === 0 && missingRequiredText.length === 0 && !(root.scrollWidth > innerWidth + 2),
            research_footprint_labels_found: researchLabels.filter((label) => text.includes(label)),
            visible_control_count: controls.length,
            visible_controls_sample: controls,
          };
        }
      args:
        - "{{required_text}}"

  - id: console_errors
    module: browser.console
    params:
      level: error
      timeout: 1000

  - id: network_sample
    module: browser.network
    params:
      action: monitor
      url_pattern: "{{api_url_pattern}}"
      timeout: "{{network_timeout_ms}}"
      include_headers: false
      strip_query: true

  - id: desktop_screenshot
    module: browser.screenshot
    params:
      path: "{{output_prefix}}-desktop.png"
      full_page: true

  - id: mobile_viewport
    module: browser.viewport
    params:
      width: 390
      height: 844

  - id: mobile_settle
    module: browser.wait
    params:
      duration_ms: 1000

  - id: mobile_audit
    module: browser.evaluate
    params:
      script: |
        (requiredTextJson) => {
          const root = document.documentElement;
          const text = document.body?.innerText || '';
          const parseRequiredText = (value) => {
            if (Array.isArray(value)) return value.filter((label) => typeof label === 'string');
            if (typeof value !== 'string') return [];
            try {
              const parsed = JSON.parse(value || '[]');
              return Array.isArray(parsed) ? parsed.filter((label) => typeof label === 'string') : [];
            } catch {
              const label = value.trim();
              return label ? [label] : [];
            }
          };
          const requiredText = parseRequiredText(requiredTextJson);
          const badTokens = [
            /\bundefined\b/i.test(text) ? 'undefined' : null,
            /\bNaN\b/.test(text) ? 'NaN' : null,
            /(^|\s)null(\s|$)/i.test(text) ? 'null' : null,
          ].filter(Boolean);
          const missingRequiredText = requiredText.filter((label) => !text.includes(label));
          return {
            url: location.href,
            viewport: { width: innerWidth, height: innerHeight },
            horizontal_overflow: root.scrollWidth > innerWidth + 2,
            document_width: root.scrollWidth,
            viewport_width: innerWidth,
            bad_tokens: badTokens,
            required_text: requiredText,
            missing_required_text: missingRequiredText,
            pass_dom_integrity: badTokens.length === 0 && missingRequiredText.length === 0 && !(root.scrollWidth > innerWidth + 2),
          };
        }
      args:
        - "{{required_text}}"

  - id: mobile_screenshot
    module: browser.screenshot
    params:
      path: "{{output_prefix}}-mobile.png"
      full_page: true

  - id: report_json
    module: data.json.stringify
    params:
      pretty: true
      data:
        recipe: flyto2-ui-smoke
        target:
          base_url: "{{base_url}}"
          path: "{{path}}"
        desktop: ${audit.result}
        mobile: ${mobile_audit.result}
        console_errors: ${console_errors.messages}
        network_sample:
          count: ${network_sample.count}
          requests: ${network_sample.requests}
        artifacts:
          desktop_screenshot: "{{output_prefix}}-desktop.png"
          mobile_screenshot: "{{output_prefix}}-mobile.png"

  - id: save
    module: file.write
    params:
      path: "{{output}}"
      content: ${report_json.json}

  - id: close
    module: browser.close
