schema_version: 1
recipe_id: flyto2-ui-login-smoke
runtime:
  engine: flyto-core
  mode: authenticated-browser-smoke
inputs:
  base_url:
    type: string
    required: true
  login_url:
    type: string
    required: true
  page_url:
    type: string
    required: true
  required_text:
    type: array
    items:
      type: string
  output_prefix:
    type: string
    required: true
runtime_args:
  - username
  - password
steps:
  - id: open-login
    module: browser.open
    params:
      url: "{{login_url}}"
  - id: submit-login
    module: browser.login
    params:
      credential_arg_names:
        - username
        - password
      redact_inputs: true
  - id: open-target
    module: browser.open
    params:
      url: "{{page_url}}"
  - id: assert-required-text
    module: browser.assert_text
    params:
      text: "{{required_text}}"
  - id: capture-redacted-evidence
    module: browser.capture
    params:
      screenshot: "{{output_prefix}}.png"
      console: "{{output_prefix}}-console.json"
      network_redaction:
        include_headers: false
        include_bodies: false
        strip_query: true
outputs:
  evidence:
    - "{{output_prefix}}.png"
    - "{{output_prefix}}-console.json"
