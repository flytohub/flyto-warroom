# Secret detection patterns
# Extracted from analyzer/secret_scanner.py
# Each pattern has an id, regex, severity, and description.

patterns:
  - id: aws_access_key
    pattern: "AKIA[0-9A-Z]{16}"
    severity: critical
    description: "AWS Access Key ID"

  - id: aws_secret_key
    pattern: "(?i)aws_secret_access_key\\s*=\\s*[A-Za-z0-9/+=]{40}"
    severity: critical
    description: "AWS Secret Access Key"

  - id: github_token
    pattern: "gh[pousr]_[A-Za-z0-9_]{36,}"
    severity: critical
    description: "GitHub Personal Access Token"

  - id: github_classic_token
    pattern: "ghp_[A-Za-z0-9]{36}"
    severity: critical
    description: "GitHub Classic Token"

  - id: gcp_service_account
    pattern: "\"type\"\\s*:\\s*\"service_account\""
    severity: critical
    description: "GCP Service Account Key JSON"

  - id: gcp_api_key
    pattern: "AIza[0-9A-Za-z_-]{35}"
    severity: high
    description: "GCP API Key"

  - id: slack_token
    pattern: "xox[baprs]-[0-9a-zA-Z-]{10,}"
    severity: high
    description: "Slack Token"

  - id: slack_webhook
    pattern: "https://hooks\\.slack\\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+"
    severity: high
    description: "Slack Webhook URL"

  - id: stripe_secret_key
    pattern: "sk_live_[0-9a-zA-Z]{24,}"
    severity: critical
    description: "Stripe Secret Key"

  - id: stripe_publishable_key
    pattern: "pk_live_[0-9a-zA-Z]{24,}"
    severity: medium
    description: "Stripe Publishable Key (not truly secret but should be env var)"

  - id: private_key
    pattern: "-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
    severity: critical
    description: "Private Key (RSA, EC, DSA, or OpenSSH)"

  - id: generic_api_key
    pattern: "(?i)(?:api_key|apikey|api-key)\\s*[:=]\\s*['\"][A-Za-z0-9_\\-]{20,}['\"]"
    severity: high
    description: "Generic API Key assignment"

  - id: generic_secret
    pattern: "(?i)(?:secret|password|passwd|pwd)\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"
    severity: high
    description: "Generic Secret / Password assignment"

  - id: jwt_token
    pattern: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]+"
    severity: high
    description: "JSON Web Token (JWT)"

  - id: firebase_key
    pattern: "(?i)firebase[A-Za-z]*\\s*[:=]\\s*['\"][A-Za-z0-9_\\-]{20,}['\"]"
    severity: high
    description: "Firebase API Key or Config Value"

  - id: twilio_api_key
    pattern: "SK[0-9a-fA-F]{32}"
    severity: high
    description: "Twilio API Key"

  - id: sendgrid_api_key
    pattern: "SG\\.[A-Za-z0-9_-]{22}\\.[A-Za-z0-9_-]{43}"
    severity: high
    description: "SendGrid API Key"

  - id: heroku_api_key
    pattern: "(?i)heroku.*[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}"
    severity: high
    description: "Heroku API Key"

# Severity weights used in health score penalty calculation
severity_weights:
  critical: 3.0
  high: 1.5
  medium: 0.5

# False-positive suppression
false_positives:
  # If the matched value contains any of these keywords, skip it
  placeholder_keywords:
    - "xxx"
    - "your-"
    - "example"
    - "placeholder"
    - "TODO"
    - "changeme"
    - "fake_"
    - "mock_"
    - "test123"
    - "password123"
    - "admin123"
    - "testpassword"
    - "12345678"

  # Never scan files with these extensions
  skip_extensions:
    - ".min.js"
    - ".min.css"
    - ".pyc"
    - ".so"
    - ".dll"
    - ".zip"
    - ".pdf"
    - ".db"
    - ".sqlite"

  # Never descend into these directories
  skip_dirs:
    - "node_modules"
    - ".git"
    - "vendor"
    - "__pycache__"
    - "dist"
    - "build"
    - ".venv"
    - "venv"
