[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flyto-indexer"
version = "2.12.2"
description = "Code intelligence MCP server for AI-assisted development — impact analysis, semantic search, and dependency graphs"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.11"
authors = [
    { name = "Flyto Team", email = "dev@flyto2.net" }
]
keywords = ["code-indexing", "ast", "ai", "development-tools"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
]

dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.21.0",
    "pytest-timeout>=2.4.0",
    "hypothesis>=6.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
    "tomli>=2.0.0; python_version < '3.11'",
]

[project.scripts]
flyto-index = "flyto_indexer.cli:main"

[project.urls]
Homepage = "https://flyto2.com"
Documentation = "https://docs.flyto2.com"
Repository = "https://github.com/flytohub/flyto-indexer"
Issues = "https://github.com/flytohub/flyto-indexer/issues"

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/config",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

# Remap src/ -> flyto_indexer/ in the wheel
[tool.hatch.build.targets.wheel.sources]
"src" = "flyto_indexer"

# Ship the rule corpus INSIDE the wheel so installed copies (engine
# container, pip-installed CLI) see the same YAML files as the dev
# tree. Without this only the .py scanner code reaches site-packages
# and rule_loader returns an empty corpus → IaC / secret / security
# scanners silently report 0 findings on known-bad fixtures.
[tool.hatch.build.targets.wheel.force-include]
"config/rules" = "flyto_indexer/config/rules"
"config/flyto2" = "flyto_indexer/config/flyto2"
# NOTE: src/open_core_manual/ (hand-authored CE-only files byte-copied into the
# generated warroom tree) ships automatically via packages=["src"] above — it
# does NOT need a force-include entry (that would double-add and fail the build).

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: stress, fuzz, race, or subprocess integration tests for full/release gates",
    "integration: tests that launch subprocesses or exercise MCP end-to-end wiring",
    "stress: timeout/race/stress tests",
    "fuzz: property-based fuzz tests",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "C4", "SIM"]
ignore = [
    "E501",    # line too long
    "E402",    # module import not at top — try/except import patterns
    "E741",    # ambiguous variable name
    "I001",    # import sorting — pre-existing mixed try/except import patterns
    "F401",    # unused imports — re-exports in __init__.py
    "F541",    # f-string without placeholders
    "F811",    # redefinition of unused name
    "F841",    # local variable assigned but never used
    "B005",    # strip multi-char — pre-existing
    "B007",    # unused loop variable — pre-existing
    "B033",    # duplicate value in set
    "B904",    # raise from — pre-existing
    "B905",    # zip without strict
    "C401",    # set comprehension over list comp
    "SIM102",  # nested if — pre-existing
    "SIM103",  # return condition — pre-existing
    "SIM105",  # contextlib.suppress — pre-existing try/except/pass
    "SIM108",  # ternary — pre-existing
    "SIM110",  # use any() instead of loop — pre-existing
    "SIM114",  # combine if branches — pre-existing
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = false
warn_return_any = false
disable_error_code = [
    "var-annotated",
    "no-redef",
    "index",
    "operator",
    "attr-defined",
    "union-attr",
    "arg-type",
    "assignment",
    "return-value",
    "list-item",
    "misc",
    "import-untyped",
    "truthy-function",
]
