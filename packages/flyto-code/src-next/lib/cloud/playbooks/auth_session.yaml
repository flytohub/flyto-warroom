# Pentest: Authentication & Session Management
# OWASP A07:2021 — Identification and Authentication Failures
id: pentest_auth_session
name: Authentication & Session Test
version: "1.0.0"
description: Brute force, missing auth, cookie integrity, session fixation

steps:
  - id: start
    module: flow.start
    label: Start
    params: {}
    orderIndex: 0

  - id: launch
    module: browser.launch
    label: Launch Browser
    params:
      stealth: true
      headless: true
    orderIndex: 1

  - id: brute_force
    module: http.batch
    label: Brute Force Check
    params:
      description: Test rate limiting on login endpoint
      requests:
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong1"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong2"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong3"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong4"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong5"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong6"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong7"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong8"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong9"}' }
        - { method: POST, url: "{{login_url}}", headers: { "Content-Type": "application/json" }, body: '{"email":"test@test.com","password":"wrong10"}' }
      measure_time: true
      check_rate_limiting: true
    orderIndex: 2

  - id: cookie_check
    module: browser.evaluate
    label: Cookie Security Audit
    params:
      script: |
        (async function() {
          // Navigate to login page first
          const results = { cookies: [], issues: [] };

          // Check all cookies
          const allCookies = document.cookie.split(';').filter(c => c.trim());
          for (const c of allCookies) {
            const [name] = c.trim().split('=');
            results.cookies.push({ name: name.trim() });
          }

          // Check via fetch for Set-Cookie headers
          try {
            const resp = await fetch(location.href, { credentials: 'include' });
            const setCookie = resp.headers.get('set-cookie') || '';
            if (setCookie) {
              if (!setCookie.includes('Secure')) results.issues.push('Cookie missing Secure flag');
              if (!setCookie.includes('HttpOnly')) results.issues.push('Cookie missing HttpOnly flag');
              if (!setCookie.includes('SameSite')) results.issues.push('Cookie missing SameSite attribute');
            }
          } catch(e) { /* fetch may be blocked by CORS/CSP on target — skip cookie header check */ }

          // Check if session token in URL
          if (location.search.includes('session') || location.search.includes('token')) {
            results.issues.push('Session token exposed in URL');
          }

          return JSON.stringify(results, null, 2);
        })()
    orderIndex: 3

  - id: password_policy
    module: http.batch
    label: Password Policy Check
    params:
      description: Test weak password acceptance
      requests:
        - { method: POST, url: "{{target_url}}/api/register", headers: { "Content-Type": "application/json" }, body: '{"email":"pentest@flyto.test","password":"123"}' }
        - { method: POST, url: "{{target_url}}/api/register", headers: { "Content-Type": "application/json" }, body: '{"email":"pentest@flyto.test","password":"password"}' }
        - { method: POST, url: "{{target_url}}/api/register", headers: { "Content-Type": "application/json" }, body: '{"email":"pentest@flyto.test","password":"a"}' }
    orderIndex: 4

  - id: session_fixation
    module: http.batch
    label: Session Fixation Check
    params:
      description: Test if pre-set session IDs are accepted
      requests:
        - method: GET
          url: "{{target_url}}"
          headers:
            Cookie: "session=attacker-controlled-session-id"
        - method: GET
          url: "{{target_url}}?sessionid=injected"
    orderIndex: 5

  - id: analyze
    module: llm.agent
    label: Analyze Results
    params:
      model: gpt-4o
      prompt: |
        Analyze authentication and session security test results.

        Brute force (10 attempts): ${brute_force.data}
        Cookie security: ${cookie_check.data}
        Password policy: ${password_policy.data}
        Session fixation: ${session_fixation.data}

        Check:
        1. Was rate limiting triggered? (after how many attempts?)
        2. Are cookies secure? (Secure, HttpOnly, SameSite)
        3. Does the app accept weak passwords?
        4. Can sessions be fixed/hijacked?

        Output JSON: { "findings": [...], "severity": "...", "summary": "..." }
    orderIndex: 6

edges:
  - { source: start, target: launch }
  - { source: launch, target: brute_force }
  - { source: brute_force, target: cookie_check }
  - { source: cookie_check, target: password_policy }
  - { source: password_policy, target: session_fixation }
  - { source: session_fixation, target: analyze }
