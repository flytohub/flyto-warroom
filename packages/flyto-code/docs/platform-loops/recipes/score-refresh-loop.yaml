id: score-refresh-loop
surface: scoring_compliance
description: Verify score, score events, and score history refresh after scan/discovery events.
requires:
  - frontend
  - engine
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/scoring?mode=engineer"
  - module: browser.extract
    selector: "main"
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/score-trends?mode=engineer"
  - module: browser.extract
    selector: "main"
assertions:
  - assert: event_invalidates_query
    event: scan.complete
    invalidates: qk.computedScore
  - assert: event_invalidates_query
    event: scan.complete
    invalidates: qk.scoring.scoreHistory
  - assert: event_invalidates_query
    event: scan.complete
    invalidates: qk.scoring.scoreEvents
  - assert: event_invalidates_query
    event: discovery.complete
    invalidates: qk.computedScore
  - assert: event_invalidates_query
    event: discovery.complete
    invalidates: qk.scoring.scoreEvents
  - assert: query_key_present
    query_key: unified-score-history
  - assert: route_renders_without_error
    step: 1
  - assert: route_renders_without_error
    step: 3
