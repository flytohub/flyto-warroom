id: darkweb-sensor-brand-loop
surface: darkweb
description: Verify Sensor Map, Brand Protection, and BotShield (IoC lens) stay wired to threat-intel reads and footprint closure rather than being orphan darkweb pages.
requires:
  - frontend
  - engine
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/sensor-map?mode=engineer"
  - module: browser.extract
    selector: "main"
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/brand-protection?mode=engineer"
  - module: browser.extract
    selector: "main"
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/botshield?mode=engineer"
  - module: browser.extract
    selector: "main"
assertions:
  - assert: query_key_present
    query_key: sensor-map
  - assert: query_key_present
    query_key: brand-manager-attack-surface
  # botshield shares the ioc_lookup capability and reads the IoC loop.
  - assert: query_key_present
    query_key: ioc-lookup
  - assert: api_path_present
    path: /sensor-map
  # Footprint closure must refresh the threat-seed context these darkweb pages feed.
  - assert: event_invalidates_query
    event: footprint.run.finalized
    invalidates: qk.footprint.threatSeed
  - assert: route_renders_without_error
    step: 1
  - assert: route_renders_without_error
    step: 3
  - assert: route_renders_without_error
    step: 5
