id: domain-scan-evidence-refresh
surface: assets
description: Verify that a domain scan updates domain detail evidence and asset inventory.
requires:
  - frontend
  - engine
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/domains?mode=engineer"
  - module: browser.click
    selector: "[data-action='scan-domain'], button:has-text('Scan')"
  - module: browser.wait
    condition: "event discovery.complete or scan.complete observed"
  - module: browser.extract
    selector: "main"
assertions:
  - assert: event_invalidates_query
    event: discovery.complete
    invalidates: qk.attackSurface
  - assert: event_invalidates_query
    event: discovery.complete
    invalidates: qk.domains.assetEvidence
  - assert: event_invalidates_query
    event: scan.complete
    invalidates: qk.domains.assetEvidence
  - assert: query_key_present
    query_key: attack-surface
  - assert: route_renders_without_error
    step: 1
