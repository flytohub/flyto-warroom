id: ai-branch-guard
surface: operations_admin
description: Verify AI-generated branch changes are blocked when they break platform closure contracts.
requires:
  - repository
  - ci
steps:
  - module: shell.run
    command: "npm run guard:branch"
assertions:
  # This recipe is the CI guard itself: running guard:branch exercises route
  # drift, mutation closure, platform-loop, navbar-smoke, AI-code, and
  # compliance evidence in one command. A non-zero exit means a closure
  # contract regressed.
  - assert: command_succeeds
    step: 1
