id: compliance-export
surface: scoring_compliance
description: Verify CI compliance evidence and system compliance export are connected.
requires:
  - frontend
  - engine
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/compliance?mode=engineer"
  - module: browser.extract
    selector: "main"
  - module: shell.run
    command: "npm run compliance:ci"
assertions:
  - assert: route_renders_without_error
    step: 1
  - assert: query_key_present
    query_key: org-compliance
  - assert: api_path_present
    path: /compliance
  - assert: command_succeeds
    step: 3
