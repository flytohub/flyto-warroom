id: enterprise-readiness-contract
surface: enterprise_control
description: Verify enterprise readiness is API-backed, visible in the control plane, and refreshed by audit/license events.
requires:
  - frontend
  - engine
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/enterprise-control-plane?mode=engineer"
  - module: api.request
    method: GET
    url: "{{engineUrl}}/api/v1/system/enterprise/readiness?org={{orgId}}"
assertions:
  - assert: api_path_present
    path: /system/enterprise/readiness
  - assert: query_key_present
    query_key: system-enterprise-readiness
  - assert: event_invalidates_query
    event: enterprise.audit.logged
    invalidates: qk.platform.enterpriseReadiness
  - assert: event_invalidates_query
    event: license.updated
    invalidates: qk.platform.enterpriseReadiness
  - assert: route_renders_without_error
    step: 1
  - assert: http_status
    step: 2
    status: 200
