id: containers-vuln-loop
surface: code_redteam
description: Verify container posture/findings and the CVE lens close back to the code-issues loop instead of floating as isolated pages. The standalone Vulnerabilities page was removed 2026-06-11 (it duplicated Code Issues); the CVE lens now lives in the unified /issues page.
requires:
  - frontend
  - engine
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/containers?mode=engineer"
  - module: browser.extract
    selector: "main"
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/issues?mode=engineer"
  - module: browser.extract
    selector: "main"
assertions:
  - assert: query_key_present
    query_key: container-posture
  - assert: query_key_present
    query_key: container-findings
  - assert: api_path_present
    path: /container-findings
  # vuln_mgmt renders IssuesView with a CVE lens, so it shares the code-issues loop.
  - assert: query_key_present
    query_key: issues
  - assert: event_invalidates_query
    event: scan.complete
    invalidates: qk.security.issues
  - assert: route_renders_without_error
    step: 1
  - assert: route_renders_without_error
    step: 3
