id: asset-map-smoke
surface: assets
description: Verify that asset map uses the same attack-surface and evidence data as Domains.
requires:
  - frontend
  - engine
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/asset-map?mode=engineer"
  - module: browser.extract
    selector: "main"
  - module: api.request
    method: GET
    url: "{{engineUrl}}/api/v1/code/orgs/{{orgId}}/asset-map/kernel"
assertions:
  - assert: route_renders_without_error
    step: 1
  - assert: event_invalidates_query
    event: scan.complete
    invalidates: qk.assetMapKernel
  - assert: event_invalidates_query
    event: discovery.complete
    invalidates: qk.assetMapKernel
  - assert: event_invalidates_query
    event: scan.complete
    invalidates: qk.domains.assetEvidence
  - assert: query_key_present
    query_key: asset-map-kernel
  - assert: query_key_present
    query_key: asset-evidence
  - assert: http_status
    step: 3
    status: 200
