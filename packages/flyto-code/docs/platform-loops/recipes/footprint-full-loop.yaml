id: footprint-full-loop
surface: overview
description: Exercise the platform pipeline from footprint trigger to final graph refresh.
requires:
  - frontend
  - engine
  - flyto-core
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/footprint?mode=engineer"
  - module: browser.click
    selector: "button:has-text('執行管線')"
  - module: browser.wait
    condition: "network response contains /platform-pipeline/run"
  - module: browser.extract
    selector: "main"
assertions:
  - assert: api_path_present
    path: /platform-pipeline/run
  - assert: event_invalidates_query
    event: pipeline.progress
    invalidates: qk.pentest.projects
  - assert: event_invalidates_query
    event: pipeline.progress
    invalidates: qk.repos.apiDefinitions
  - assert: event_invalidates_query
    event: pipeline.progress
    invalidates: qk.repos.archMap
  - assert: event_invalidates_query
    event: footprint.run.finalized
    invalidates: qk.footprint.graph
  - assert: event_invalidates_query
    event: footprint.run.finalized
    invalidates: qk.footprint.narrative
  - assert: event_invalidates_query
    event: footprint.run.finalized
    invalidates: qk.footprint.candidatePaths
  - assert: event_invalidates_query
    event: footprint.run.finalized
    invalidates: qk.footprint.surfaceEvidence
  - assert: route_renders_without_error
    step: 1
