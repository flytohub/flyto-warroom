id: operations-health-smoke
surface: operations_admin
description: Verify operations, settings, reports, and API key admin pages are operator-connected.
requires:
  - frontend
  - engine
steps:
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/operations?mode=engineer"
  - module: browser.extract
    selector: "main"
  - module: browser.goto
    url: "{{baseUrl}}/projects/{{orgId}}/settings?mode=engineer"
  - module: browser.extract
    selector: "main"
assertions:
  - assert: event_invalidates_query
    event: integration.expired
    invalidates: qk.integrations.health
  - assert: query_key_present
    query_key: api-keys
  - assert: query_key_present
    query_key: integration-health
  - assert: route_renders_without_error
    step: 1
  - assert: route_renders_without_error
    step: 3
