name: CLA Assistant
# Requires every PR author to sign the Contributor License Agreement (CLA.md)
# before their contribution can be accepted/ported upstream.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT with repo scope on the signatures repo (set as a repo secret).
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: 'signatures/cla-signatures.json'
          path-to-document: 'https://github.com/flytohub/flyto-warroom/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],*[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
