server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index-next.html index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # /explore portal is sign-in-only (2026-05-18 lockdown). robots.txt
    # below tells every crawler not to index anything on this host —
    # served directly from nginx (no engine round-trip) so we have a
    # single source of truth for crawl policy. Sitemap is intentionally
    # returned empty: existing references resolve to a valid empty
    # urlset rather than a 404 that search engines remember for weeks.
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }
    location = /sitemap.xml {
        default_type application/xml;
        return 200 '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"></urlset>\n';
    }

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"flyto-code"}\n';
    }

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"flyto-code"}\n';
    }

    # CE/self-hosted Docker Compose serves the SPA and engine from one
    # origin. API paths must never fall through to index-next.html.
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $flyto_engine_upstream http://engine:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_pass $flyto_engine_upstream$request_uri;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index-next.html;
    }

    # Cache policy for the SPA shell.
    #
    # Server-level so it's inherited by `location /` (which has no
    # add_header of its own and therefore inherits every server-level
    # header). That makes the HTML entrypoint (index-next.html) and the
    # other un-hashed root files (favicon, manifest, …) always
    # revalidate — so a fresh deploy is picked up on the next load
    # instead of the browser serving a stale index that references the
    # OLD hashed bundle and keeps calling retired API routes (the
    # reports/generate + VA-report 404 incidents, 2026-05-29).
    #
    # `/assets/` is NOT affected: it has its own add_header block, so
    # per nginx's inheritance rule it does NOT inherit this directive and
    # keeps `public, immutable` — correct, because those filenames are
    # content-hashed and change on every build.
    add_header Cache-Control "no-cache, must-revalidate" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS — force HTTPS for 2 years, cover subdomains. Only enable
    # AFTER you're certain warroom.flyto2.com (and any sibling host)
    # will never need to serve over plain HTTP — once the browser
    # caches HSTS the only fix is preload-list removal.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Permissions-Policy — explicitly deny features the war-room never
    # needs. Reduces attack surface if an XSS lands inside this origin.
    # Add features back here if a legitimate feature ever needs them.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), midi=(), interest-cohort=()" always;

    # CSP — narrowed from 'self' https: to known hosts only. connect-src
    # lists every backend the SPA legitimately talks to: flyto-engine
    # API + GitHub/GitLab OAuth + Firebase Auth + the i18n CDN. Add new
    # hosts here when adding a new integration; never re-open with bare
    # `https:` as that defeats CSP's value as an exfiltration brake.
    #
    # Firebase Auth specifics:
    #   script-src      apis.google.com   — Firebase iframe API loader
    #                   www.gstatic.com   — Firebase SDK CDN
    #                   accounts.google.com — Google sign-in JS
    #   frame-src       <project>.firebaseapp.com — Auth iframe origin
    #                   accounts.google.com       — Google OAuth chooser
    #                   github.com                — GitHub OAuth flow
    #   script-src-elem explicitly mirrors script-src so browsers don't
    #                   fall back and emit a "wasn't explicitly set" warning
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://apis.google.com https://www.gstatic.com https://accounts.google.com; script-src-elem 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' http://localhost:8080 http://127.0.0.1:8080 https://engine.flyto2.com https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.github.com https://gitlab.com https://*.gitlab.com https://cdn.jsdelivr.net https://raw.githubusercontent.com; frame-src 'self' https://ticket-helper-dbc0e.firebaseapp.com https://accounts.google.com https://github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
}
