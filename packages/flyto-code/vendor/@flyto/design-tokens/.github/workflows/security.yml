name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC — offset to avoid runner stampede
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Secret + Dependency scan
    uses: flytohub/.github/.github/workflows/reusable-security.yml@main
    with:
      stack: npm
    permissions:
      contents: read
    secrets: inherit

  sbom:
    name: SBOM (CycloneDX)
    uses: flytohub/.github/.github/workflows/reusable-sbom.yml@main
    permissions:
      actions: read
      contents: write
      packages: read
      security-events: write
    secrets: inherit
