name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: python -m pip install --disable-pip-version-check "flyto-indexer @ git+https://github.com/flytohub/flyto-indexer@1b624987b15ef7cd2361370478d07ea36e5aa5ee"
      - run: npm audit --audit-level=high
      - run: npm run verify
      - run: flyto-index verify . --full-scan --strict
