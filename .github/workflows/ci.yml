name: Flyto2 Warroom CE

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  governance-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Audit GitHub protection files
        run: python scripts/audit-github-protection.py .
      - name: Audit CE moat and privacy boundary
        run: python scripts/audit-ce-boundary.py .
      - name: Audit deterministic source provenance
        run: python scripts/audit-provenance.py .
      - name: Audit open-core overlay contract
        run: python scripts/audit-open-core-overlay.py .

  release-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # The exporter and indexer live in the external flyto-indexer package
      # (tested in their own repo's CI); this mirror no longer vendors them.
      - name: Lint release tree
        run: |
          python install/scripts/audit-release-tree.py .
          python scripts/audit-ce-boundary.py .
          python scripts/audit-provenance.py .
          python scripts/audit-open-core-overlay.py .
          python scripts/audit-github-protection.py .
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/flyto-engine-ce/go.mod
      - name: Test engine CE source package
        working-directory: services/flyto-engine-ce
        run: go test ./...
      - name: Verify release tree
        run: |
          make verify
          python install/scripts/verify-docker-images.py --dry-run
      - name: Verify source graph with flyto-index
        run: |
          python -m pip install flyto-indexer
          flyto-index verify . --full-scan --strict --json
          python scripts/generate-documentation-reference.py --check
          flyto-index sbom . --name flyto2-warroom-ce --output /tmp/flyto2-warroom-ce.cdx.json
          flyto-index license . --json > /tmp/flyto2-warroom-ce-licenses.json
      - name: Upload CE SBOM and license evidence
        uses: actions/upload-artifact@v7
        with:
          name: flyto2-warroom-ce-supply-chain
          path: |
            /tmp/flyto2-warroom-ce.cdx.json
            /tmp/flyto2-warroom-ce-licenses.json
      - name: Audit generated release boundary
        run: python install/scripts/audit-release-tree.py .
      - name: Audit CE moat and privacy boundary
        run: python scripts/audit-ce-boundary.py .
      - name: Validate public contracts
        run: |
          python packages/flyto-contracts/conformance/validate.py runner-callback packages/flyto-contracts/examples/runner-callback.json
          python packages/flyto-contracts/conformance/validate.py evidence-event packages/flyto-contracts/examples/evidence-event.json
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/flyto-code/package-lock.json
      - name: Build frontend package
        working-directory: packages/flyto-code
        env:
          VITE_ENGINE_URL: http://localhost:8080
          VITE_AUTH_MODE: local_jwt
          VITE_AUTOMATION_URL: http://localhost:8080
          VITE_CORTEX_URL: http://localhost:8080
        run: |
          npm ci --legacy-peer-deps
          npm audit --audit-level=high
          npm run lint
          npm run build
      - name: Export upstream patch preview
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          python scripts/export-upstream-patches.py --base origin/main --output upstream-patches

  source-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Generate local CE infrastructure secrets
        run: python3 install/scripts/setup-ce.py
      - name: Validate source Compose model
        run: docker compose --env-file install/.env -f install/docker-compose.source.yml config --quiet
      - name: Build and start public source profile
        run: docker compose --env-file install/.env -f install/docker-compose.source.yml up -d --build
      - name: Smoke public source product loop
        run: python3 install/scripts/smoke-source-stack.py
      - name: Capture source service logs
        if: failure()
        run: docker compose --env-file install/.env -f install/docker-compose.source.yml logs --no-color
      - name: Stop public source profile
        if: always()
        run: docker compose --env-file install/.env -f install/docker-compose.source.yml down --volumes
